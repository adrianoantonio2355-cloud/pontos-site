# Documentação: Nome do processo que vai aparecer no GitHub
name: Publicar no GitHub Pages

# Documentação: Gatilho - Quando este robô deve trabalhar?
on:
  push:
    branches: ["main"]

# Documentação: Permissões necessárias para publicar o site
permissions:
  contents: read
  pages: write
  id-token: write

# Documentação: Lista de tarefas do nosso robô
jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Baixar o código
        uses: actions/checkout@v4

      - name: Instalar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Instalar dependências
        run: npm install

      - name: Construir o site (Build)
        run: npm run build

      - name: Configurar GitHub Pages
        uses: actions/configure-pages@v4

      - name: Preparar ficheiros para upload
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist'

      - name: Publicar Site
        id: deployment
        uses: actions/deploy-pages@v4
          echo test, and deploy your project.
